<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ads & SEO Builder | Ola Osman</title>
    <style>
        /* إعدادات الشاشة الكاملة والخلفية */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, rgba(124, 58, 237, 0.28), transparent 28%),
                        radial-gradient(circle at top right, rgba(6, 182, 212, 0.22), transparent 26%),
                        linear-gradient(135deg, #0f172a, #111827, #1e293b);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .page {
            width: 100%;
            max-width: 98% !important; /* لضمان ملء الشاشة */
            margin: 0 auto;
            padding: 20px;
        }

        /* الهيدر */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            margin-bottom: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .hero h1 { margin: 0; font-size: 32px; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-badge { background: linear-gradient(135deg, #7c3aed, #06b6d4); padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 14px; }

        /* تقسيم الصفحة */
        .container {
            display: grid;
            grid-template-columns: 350px 1fr; /* عمود جانبي للمدخلات والباقي للنتائج */
            gap: 25px;
            align-items: start;
        }

        .card-panel {
            background: rgba(255, 255, 255, 0.06);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        /* التصميم الداخلي للمدخلات */
        label { display: block; margin: 15px 0 5px; color: #cbd5e1; font-weight: 500; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.5);
            color: white;
            outline: none;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: #7c3aed; box-shadow: 0 0 10px rgba(124, 58, 237, 0.3); }

        .primary-btn {
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }
        .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(124, 58, 237, 0.4); }

        /* منطقة النتائج */
        .outputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }

        .result-card { min-height: 200px; }
        .result-card h3 { margin-top: 0; color: #a78bfa; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

        .tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .keyword { background: rgba(124, 58, 237, 0.2); border: 1px solid rgba(124, 58, 237, 0.3); padding: 6px 15px; border-radius: 20px; font-size: 13px; color: #ddd; }
        
        .result-list { list-style: none; padding: 0; }
        .result-item { 
            background: rgba(255,255,255,0.03); 
            padding: 12px; 
            border-radius: 10px; 
            margin-bottom: 8px; 
            border-left: 4px solid #06b6d4;
            font-size: 14px;
            line-height: 1.5;
        }

        /* لودر التحميل */
        .hidden { display: none; }
        .loader { text-align: center; padding: 20px; color: #7c3aed; font-weight: bold; }

        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="hero">
            <div>
                <h1>Smart Ads & SEO Builder</h1>
                <p style="color: #94a3b8; margin: 5px 0 0;">Advanced AI Content Strategy Dashboard</p>
            </div>
            <div class="hero-badge">Ola Osman • Senior Developer</div>
        </header>

        <main class="container">
            <section class="card-panel">
                <h2 style="margin-top:0">Settings</h2>
                
                <label>Project Name</label>
                <input id="projectName" type="text" placeholder="e.g. Hajja Portal" />

                <label>Industry</label>
                <select id="industry">
                    <option>Technology</option>
                    <option>Podcast / Storytelling</option>
                    <option>Education</option>
                    <option>Food / Cooking</option>
                    <option>Health / Wellness</option>
                </select>

                <label>Language</label>
                <select id="language">
                    <option value="en">English</option>
                    <option value="ar">العربية</option>
                </select>

                <label>Target Audience</label>
                <textarea id="audience" rows="3" placeholder="Who are you targeting?"></textarea>

                <button class="primary-btn" id="generateBtn">✨ Generate Content</button>
            </section>

            <section class="outputs">
                <div class="card-panel result-card">
                    <h3>🔎 SEO Keywords</h3>
                    <div id="primaryKeywords" class="tags"></div>
                </div>

                <div class="card-panel result-card">
                    <h3>✨ Slogans</h3>
                    <div id="slogans" class="result-list"></div>
                </div>

                <div class="card-panel result-card">
                    <h3>📣 Headlines</h3>
                    <div id="shortHeadlines" class="result-list"></div>
                </div>

                <div class="card-panel result-card">
                    <h3>📝 Descriptions</h3>
                    <div id="descriptions" class="result-list"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const btn = document.getElementById('generateBtn');

        // إرسال البيانات لـ Streamlit
        btn.addEventListener('click', () => {
            const data = {
                project: document.getElementById('projectName').value,
                industry: document.getElementById('industry').value,
                language: document.getElementById('language').value,
                audience: document.getElementById('audience').value
            };

            if(!data.project) { alert("Please enter a project name!"); return; }

            // تفعيل حالة التحميل
            btn.innerText = "Processing with Gemini...";
            btn.style.opacity = "0.7";

            window.parent.postMessage({
                type: 'streamlit:setComponentValue',
                value: data
            }, '*');
        });

        // استقبال النتائج من الـ Python (Streamlit)
        window.addEventListener('message', (event) => {
            if (event.data.type === 'streamlit:render') {
                const aiData = event.data.args.ai_output;
                if (aiData) {
                    try {
                        const res = JSON.parse(aiData);
                        
                        // توزيع البيانات على المربعات
                        if(res.primaryKeywords) {
                            document.getElementById('primaryKeywords').innerHTML = res.primaryKeywords.map(k => `<span class="keyword">${k}</span>`).join('');
                        }
                        if(res.slogans) {
                            document.getElementById('slogans').innerHTML = res.slogans.map(s => `<div class="result-item">${s}</div>`).join('');
                        }
                        if(res.shortHeadlines) {
                            document.getElementById('shortHeadlines').innerHTML = res.shortHeadlines.map(h => `<div class="result-item">${h}</div>`).join('');
                        }
                        if(res.descriptions) {
                            document.getElementById('descriptions').innerHTML = res.descriptions.map(d => `<div class="result-item">${d}</div>`).join('');
                        }

                        // إعادة حالة الزر
                        btn.innerText = "✨ Generate Content";
                        btn.style.opacity = "1";
                    } catch (e) {
                        console.error("JSON Error:", e);
                        btn.innerText = "Error in formatting";
                    }
                }
            }
        });
    </script>
</body>
</html>
