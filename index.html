<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        input, select, textarea { width: 100%; margin: 10px 0; padding: 10px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #7c3aed; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .res-item { background: #1e293b; padding: 15px; border-top: 4px solid #7c3aed; border-radius: 5px; min-height: 150px; }
        .tag { background: #7c3aed; padding: 4px 10px; border-radius: 15px; margin: 3px; display: inline-block; font-size: 12px; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="card">
            <h3>Settings</h3>
            <input id="pName" placeholder="Project Name">
            <select id="lang" onchange="document.body.dir = (this.value=='ar'?'rtl':'ltr')">
                <option value="en">English</option>
                <option value="ar">العربية</option>
            </select>
            <select id="ind">
                <option value="Podcast">Podcast / بودكاست</option>
                <option value="Cooking">Cooking / طبخ</option>
                <option value="SaaS">Software / برمجيات</option>
            </select>
            <textarea id="aud" rows="3" placeholder="Target Audience"></textarea>
            <button id="btn">✨ Generate Now</button>
        </div>
        <div class="res-grid">
            <div class="res-item"><h4>Keywords</h4><div id="k"></div></div>
            <div class="res-item"><h4>Slogans</h4><div id="s"></div></div>
            <div class="res-item"><h4>Headlines</h4><div id="h"></div></div>
            <div class="res-item"><h4>Descriptions</h4><div id="d"></div></div>
        </div>
    </div>
    <script>
        document.getElementById('btn').onclick = function() {
            const val = document.getElementById('pName').value.trim();
            if(!val) return alert("Enter Name!");
            this.innerText = "...Loading";
            window.parent.postMessage({type: 'streamlit:setComponentValue', value: {
                project: val, industry: document.getElementById('ind').value,
                language: document.getElementById('lang').value, country: 'Sudan',
                audience: document.getElementById('aud').value
            }}, '*');
        };

        /*AI_DATA_PLACEHOLDER*/
        if (typeof ai_output !== 'undefined' && ai_output) {
            document.getElementById('k').innerHTML = ai_output.primaryKeywords.map(i => `<span class="tag">${i}</span>`).join('');
            document.getElementById('s').innerHTML = ai_output.slogans.map(i => `<div>• ${i}</div>`).join('<br>');
            document.getElementById('h').innerHTML = ai_output.shortHeadlines.map(i => `<div>• ${i}</div>`).join('<br>');
            document.getElementById('d').innerHTML = ai_output.descriptions.map(i => `<div>• ${i}</div>`).join('<br>');
        }
    </script>
</body>
</html>
