<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; margin: 0; }
        .form-card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h3 { color: #7c3aed; margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        label { display: block; margin: 12px 0 5px; font-size: 14px; color: #94a3b8; }
        input, select, textarea { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; 
            background: #0f172a; color: white; outline: none; font-size: 14px;
        }
        input:focus, select:focus, textarea:focus { border-color: #7c3aed; }
        button { 
            width: 100%; padding: 15px; margin-top: 20px; border-radius: 8px; 
            background: linear-gradient(135deg, #7c3aed, #06b6d4); color: white; 
            border: none; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="form-card">
        <h3>إعدادات الحملة الإبداعية 🎨</h3>
        
        <label>اسم المشروع</label>
        <input id="pName" placeholder="مثلاً: هكاوينا">

        <label>لغة المحتوى المطلوبة</label>
        <select id="lang" onchange="document.documentElement.dir = (this.value === 'ar' ? 'rtl' : 'ltr');">
            <option value="ar">العربية (Arabic)</option>
            <option value="en">الإنجليزية (English)</option>
        </select>

        <label>المجال / التخصص</label>
        <select id="ind">
            <option value="Podcast">بودكاست (Podcast)</option>
            <option value="Cooking">طبخ (Cooking)</option>
            <option value="SaaS">برمجيات (SaaS/Tech)</option>
            <option value="Real Estate">عقارات (Real Estate)</option>
            <option value="E-commerce">تجارة إلكترونية (E-commerce)</option>
            <option value="Education">تعليم (Education)</option>
            <option value="Health">صحة ولياقة (Health)</option>
        </select>

        <label>الجمهور المستهدف</label>
        <textarea id="aud" rows="3" placeholder="من هم جمهورك؟ (مثلاً: الشباب المهتم بالثقافة السودانية)"></textarea>

        <button id="genBtn">✨ توليد المحتوى الآن</button>
    </div>

    <script>
        document.getElementById('genBtn').onclick = function() {
            const name = document.getElementById('pName').value.trim();
            if(!name) return alert("يا علا، اكتبي اسم المشروع أولاً!");
            
            this.innerText = "...جاري إرسال البيانات";
            this.style.opacity = "0.7";

            window.parent.postMessage({
                type: 'streamlit:setComponentValue', 
                value: {
                    project: name,
                    industry: document.getElementById('ind').value,
                    language: document.getElementById('lang').value,
                    audience: document.getElementById('aud').value
                }
            }, '*');
        };
    </script>
</body>
</html>
