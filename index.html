<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 10px; }
        .box { background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #334155; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #7c3aed, #06b6d4); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#7c3aed">إعدادات هكاوينا ✨</h2>
        <label>اسم المشروع</label>
        <input id="p" placeholder="مثلاً: هكاوينا">
        <label>اللغة</label>
        <select id="l">
            <option value="ar">العربية (لهجة سودانية)</option>
            <option value="en">English</option>
        </select>
        <label>المجال</label>
        <select id="i">
            <option value="Podcast">بودكاست</option>
            <option value="Cooking">طبخ</option>
            <option value="SaaS">برمجيات</option>
            <option value="Real Estate">عقارات</option>
        </select>
        <textarea id="a" placeholder="منو جمهورك؟" rows="2"></textarea>
        <button id="btn">✨ توليد المحتوى</button>
    </div>
    <script>
        document.getElementById('btn').onclick = function() {
            const name = document.getElementById('p').value;
            if(!name) return alert("اكتبي الاسم يا علا!");
            this.innerText = "...جاري الإرسال";
            window.parent.postMessage({type: 'streamlit:setComponentValue', value: {
                project: name, language: document.getElementById('l').value,
                industry: document.getElementById('i').value, audience: document.getElementById('a').value
            }}, '*');
        };
    </script>
</body>
</html>
