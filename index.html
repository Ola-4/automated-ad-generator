<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AI Marketing Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">

<header>
<h1>AI Marketing Dashboard</h1>
<p>Create ads, SEO keywords and CTAs instantly</p>
</header>

<div class="container">

<!-- LEFT SIDE -->
<div class="inputs">

<h2>The Inputs</h2>

<label>Project Name</label>
<input id="projectName" type="text" placeholder="Example: Nova Launch">

<label>Service / Product</label>
<select id="service">
<option value="">Select</option>
<option>Digital Marketing</option>
<option>SaaS Platform</option>
<option>Ecommerce Store</option>
<option>Training Program</option>
</select>

<label>Target Location</label>
<input id="location" type="text" placeholder="Example: Dubai">

<label>Industry</label>
<select id="industry">
<option value="">Select</option>
<option>Technology</option>
<option>Education</option>
<option>Retail</option>
<option>Healthcare</option>
<option>Finance</option>
</select>

<label>Target Audience</label>
<textarea id="audience" placeholder="Example: young entrepreneurs"></textarea>

<button onclick="generateResults()">Generate Results</button>

</div>


<!-- RIGHT SIDE -->
<div class="outputs">

<div class="card">

<h3>Ad Copy</h3>

<h4>Short Headlines</h4>
<div id="shortHeadlines"></div>

<h4>Long Headlines</h4>
<div id="longHeadlines"></div>

</div>


<div class="card">

<h3>SEO Hub</h3>

<h4>Primary Keywords</h4>
<div id="primaryKeywords"></div>

<h4>LSI Keywords</h4>
<div id="lsiKeywords"></div>

</div>


<div class="card">

<h3>CTA Magic</h3>
<div id="ctaButtons"></div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
