<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Ads & SEO Builder</title>
  <style>
    /* هنا كود الـ CSS بتاعك اللي إنتِ كتبتيه */
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: Arial, sans-serif;
      background: radial-gradient(circle at top left, rgba(124, 58, 237, 0.28), transparent 28%),
                  radial-gradient(circle at top right, rgba(6, 182, 212, 0.22), transparent 26%),
                  linear-gradient(135deg, #0f172a, #111827, #1e293b);
      color: white; min-height: 100vh;
    }
    .page { max-width: 1440px; margin: auto; padding: 28px 18px; }
    .hero { display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 24px; padding: 24px; border-radius: 24px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(14px); box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22); }
    .hero-badge { background: linear-gradient(135deg, #7c3aed, #06b6d4); padding: 12px 18px; border-radius: 999px; font-weight: bold; white-space: nowrap; box-shadow: 0 10px 25px rgba(124, 58, 237, 0.35); }
    .container { display: grid; grid-template-columns: 400px 1fr; gap: 24px; }
    .card-panel { background: rgba(255, 255, 255, 0.07); padding: 24px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.09); backdrop-filter: blur(12px); }
    input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; }
    .primary-btn { width: 100%; background: linear-gradient(135deg, #7c3aed, #6d28d9); padding: 15px; border-radius: 12px; cursor: pointer; border: none; color: white; font-weight: bold; margin-top: 20px; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .keyword { background: #334155; padding: 6px 12px; border-radius: 20px; font-size: 14px; }
    .result-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #7c3aed; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <h1>Smart Ads & SEO Builder</h1>
        <p>Generate high-quality marketing content with AI</p>
      </div>
      <div class="hero-badge">Ola Osman Edition</div>
    </header>

    <div class="container">
      <div class="card-panel">
        <label>Project Name</label>
        <input id="projectName" placeholder="Hajja Portal..." />
        <label>Industry</label>
        <select id="industry">
            <option>Podcast / Storytelling</option>
            <option>Technology</option>
            <option>Education</option>
        </select>
        <label>Language</label>
        <select id="language">
            <option value="en">English</option>
            <option value="ar">العربية</option>
        </select>
        <button class="primary-btn" id="generateBtn">✨ Generate Strategy</button>
      </div>

      <div class="outputs">
        <div class="card-panel">
          <h3>🔎 SEO Keywords</h3>
          <div id="primaryKeywords" class="tags"></div>
        </div>
        <div class="card-panel">
          <h3>✨ Slogans</h3>
          <div id="slogans" class="result-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const btn = document.getElementById('generateBtn');
    btn.addEventListener('click', () => {
        const data = {
            project: document.getElementById('projectName').value,
            industry: document.getElementById('industry').value,
            language: document.getElementById('language').value
        };
        // إرسال البيانات لـ Streamlit
        window.parent.postMessage({
            type: 'streamlit:setComponentValue',
            value: data
        }, '*');
        btn.innerText = "Generating...";
    });

    // استقبال النتائج من Gemini وعرضها
    window.addEventListener('message', (event) => {
        if (event.data.type === 'streamlit:render') {
            const aiData = event.data.args.ai_output;
            if (aiData) {
                const res = JSON.parse(aiData);
                document.getElementById('primaryKeywords').innerHTML = res.primaryKeywords.map(k => `<span class="keyword">${k}</span>`).join('');
                document.getElementById('slogans').innerHTML = res.slogans.map(s => `<div class="result-item">${s}</div>`).join('');
                btn.innerText = "✨ Generate Strategy";
            }
        }
    });
  </script>
</body>
</html>
